<form [formGroup]="form">
  <app-form-date-picker formControlName="selectedDate" [showIcon]="false"></app-form-date-picker>

  <div class="mt-5 flex gap-3">
    <div class="max-w-[160px]">
      <app-donut-chart
        [values]="donutChart.data"
        [labels]="donutChart.labels"
        [showLegend]="false"
        containerClass="w-[160px] md:w-full"
      ></app-donut-chart>
    </div>

    <div class="w-full pl-8 pt-8">
      <div class="flex justify-between mb-4 text-sm">
        <span class="d-flex text-primary">Stories</span
        ><span class="d-flex font-bold text-base">{{ StoriesValue | number: '1.0-0' }}</span>
      </div>

      <div class="flex justify-between mb-4 text-sm">
        <span class="d-flex text-chart-1">Bugs</span
        ><span class="d-flex font-bold text-base">{{ BugsValue | number: '1.0-0' }}</span>
      </div>

      <div class="flex justify-between text-base">
        <span class="d-flex text-neutralGray-500">Overall</span
        ><span class="d-flex font-bold text-lg">{{ OverallTickets | number: '1.0-0' }}</span>
      </div>
    </div>
  </div>

  <div class="w-full mt-[22px]">
    <app-simple-table
      [tableData]="simpleTable.data"
      [columns]="simpleTable.columns"
    ></app-simple-table>
  </div>
</form>
