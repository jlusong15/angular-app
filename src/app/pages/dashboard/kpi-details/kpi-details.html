<form [formGroup]="form">
  <p-datepicker
    formControlName="selectedDate"
    [iconDisplay]="'input'"
    [showIcon]="true"
    class="text-gray-500"
  >
    <ng-template #inputicon let-clickCallBack="clickCallBack" class="">
      <i class="pi pi-calendar" (click)="clickCallBack($event)"></i>
    </ng-template>
  </p-datepicker>
</form>
