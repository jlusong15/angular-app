<h3 class="mb-5">My Dashboard</h3>

<div class="flex justify-around gap-5">
  <div class="flex flex-col w-full gap-5">
    <!-- Column 1 -->
    <div class="bg-white w-full border shadow-sm rounded-md">
      <div class="px-6 pt-6 pb-5">
        <h3 class="mb-3">KPI</h3>
        <span class="flex text-3xl font-geist font-bold my-1">3,232</span>
        <span class="flex text-gray-500">TOTAL FINISHED TICKETS</span>
      </div>

      <div class="w-full max-h-[405px] pb-6 px-2">
        <app-bar-chart
          [data]="kpiData"
          [yAxis]="false"
          [legend]="false"
          [showGridLines]="false"
          [showDataLabel]="false"
        ></app-bar-chart>
      </div>
    </div>

    <div class="bg-white w-full border shadow-sm rounded-md">
      <div class="p-6">
        <!-- date -->
      </div>
    </div>
  </div>

  <div class="d-flex w-full">
    <!-- Column 2 -->
     <div class="bg-white w-full border shadow-sm rounded-md">
      <div class="p-6">
        Column 2
      </div>
    </div>
  </div>

  <div class="d-flex w-full">
    <!-- Column 3 -->
     <div class="bg-white w-full border shadow-sm rounded-md">
      <div class="p-6">
        Column 3
      </div>
    </div>
  </div>
</div>
