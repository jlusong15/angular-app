<form [formGroup]="form">
  <div class="p-5 flex flex-col gap-5">
    <div class="flex items-center">
      <app-form-switch formControlName="includeBugs" class="mr-3 pt-2"></app-form-switch>
      <span>Include Bugs</span>
    </div>
    <div class="w-full">
      <span class="text-sm font-bold text-neutralGray-500">Past 6 months</span>
    </div>
    <div class="w-full">
      <app-line-chart
        [labels]="chartLabel"
        [values]="lineChartData"
        [showLegend]="false"
        [showYTick]="false"
        [showXGrid]="false"
        containerClass="h-[220px]"
      ></app-line-chart>
    </div>
    <div class="w-full">
      <span class="text-sm font-bold text-neutralGray-500">By Project</span>
    </div>
    <div class="w-full">
      <app-form-date-picker formControlName="project"></app-form-date-picker>
    </div>
    <div class="w-full">
      <app-simple-table
        [tableData]="simpleTable.data"
        [columns]="simpleTable.columns"
      ></app-simple-table>
    </div>
  </div>
</form>
