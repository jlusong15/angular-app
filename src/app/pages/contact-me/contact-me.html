<div class="flex justify-between">
  <div class="p-4 w-full">
    <!-- Header -->
    <h3 class="mb-5">Contact</h3>
    <div class="mb-5">
      <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Content -->
    <div class="pt-2">
      <h4 class="mb-5">Send me a message!</h4>
      <div class="flex flex-col gap-2 h-[300px]"><app-editor></app-editor></div>
      <p-button label="Send" class="[&_button]:bg-primary" (onClick)="submit()"/>
    </div>
  </div>

  <!-- Right Sidebar -->
  <app-right-sidebar></app-right-sidebar>
</div>
