<div class="flex justify-between">
  <div class="p-4 w-full">
    <!-- Header -->
    <h3 class="mb-5">Contact</h3>
    <div class="mb-5">
      <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
    </div>

    <!-- Content -->
    <div class="pt-2">
      <h4 class="mb-5">Send me a message!</h4>
      <div class="flex flex-col gap-2">
        <form [formGroup]="form">
          <app-editor
            formControlName="content"
            placeholder="Write something..."
            height="300px"
          ></app-editor>
        </form>

        <p-button label="Send" class="[&_button]:bg-primary" [disabled]="!form?.value?.content" (onClick)="submit()" />

        <hr class="my-3" />

        <div>
          <h5>Form Value:</h5>
          <pre>{{ form.value | json }}</pre>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Sidebar -->
  <app-right-sidebar></app-right-sidebar>
</div>
