<nav class="sticky top-0 bg-primary z-50">
  <div class="px-2">
    <div class="relative flex h-16 items-center justify-between">
      <!-- Mobile menu button -->
      <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
        <button
          (click)="toggleMobile()"
          class="relative inline-flex items-center justify-center rounded-md p-2 text-white hover:bg-white/5 hover:text-white"
        >
          @if (mobileOpen()) {
            <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg class="size-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="2" d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          }
        </button>
      </div>

      <!-- Desktop navigation -->
      <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">
        <div class="hidden sm:block">
          <div class="flex space-x-4">
            <a
              *ngFor="let item of navigation"
              [routerLink]="item.route"
              [ngClass]="{
                'bg-white text-primary': item.current,
                'text-white hover:bg-white/5 hover:text-white': !item.current,
              }"
              class="rounded-md px-3 py-2 text-sm font-medium"
            >
              {{ item.name }}
            </a>
          </div>
        </div>
      </div>

      <!-- Profile menu -->
      <div class="absolute inset-y-0 right-0 flex items-center pr-2 sm:static sm:ml-6">
        <div class="relative pr-3">
          <button
            (click)="toggleProfile()"
            class="flex rounded-full border border-gray-300 p-2 hover:bg-white/5"
          >
            <lucide-icon
              [img]="CatIcon"
              class="my-icon text-white group-hover/profile:text-white"
            ></lucide-icon>
          </button>

          @if (profileOpen()) {
            <div
              class="absolute right-0 z-10 mt-3 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg"
            >
              <a
                routerLink="/profile"
                class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
              >
                My Profile
              </a>

              <a
                href="https://buymeacoffee.com/jhennalilu"
                target="_blank"
                class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
              >
                Buy me coffee?
              </a>
            </div>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (mobileOpen()) {
    <div class="sm:hidden">
      <div class="space-y-1 px-2 pt-2 pb-3">
        <a
          *ngFor="let item of navigation"
          [routerLink]="item.route"
          [ngClass]="{
            'bg-gray-900 text-white': item.current,
            'text-gray-300 hover:bg-white/5 hover:text-white': !item.current,
          }"
          class="block rounded-md px-3 py-2 text-base font-medium"
        >
          {{ item.name }}
        </a>
      </div>
    </div>
  }
</nav>
