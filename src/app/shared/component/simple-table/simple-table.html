<div class="card">
  <p-table [value]="tableData" [columns]="columns" [tableStyle]="{ 'font-size': '12px' }">
    <ng-template #header let-columns>
      <tr>
        @for (col of columns; track col) {
          <th [pSortableColumn]="col.sortable ? col.field : ''" [class]="col.class ?? ''">
            <div class="flex items-center gap-2">
              {{ col.header || '' }}
              @if (col.sortable) {
                <p-sortIcon [field]="col.field" class="size-2" />
              }
            </div>
          </th>
        }
      </tr>
    </ng-template>
    <ng-template #body let-rowData let-columns="columns">
      <tr>
        @for (col of columns; track col) {
          <td>
            {{ rowData[col.field] }}
          </td>
        }
      </tr>
    </ng-template>
  </p-table>
</div>
