<div class="p-4 bg-slate-50 w-[250px] min-h-svh h-full">
  <p-button
    label="Add Task"
    class="w-full [&_button]:w-full [&_button]:bg-primary [&_button]:text-sm"
    icon="pi pi-plus-circle"
  />
  <div class="my-2.5 flex gap-x-2 justify-between">
    <div class="w-full">
      <input
        pInputText
        type="text"
        placeholder="Type here..."
        class="w-full shadow-none! focus:shadow-none !border-gray-300 !text-xs"
      />
    </div>
    <div>
      <p-button
        (click)="op.toggle($event)"
        severity="secondary"
        class="m-0 [&_button]:border-gray-300 border [&_button]:bg-white"
      >
        <ng-template pTemplate="content">
          <lucide-icon [img]="Icons.ListFilter" class="size-4"></lucide-icon>
        </ng-template>
      </p-button>
      <p-popover styleClass="no-arrow" #op>
        <div class="flex flex-col gap-4 w-[12rem] text-gray-500 text-xs">Add filters here...</div>
      </p-popover>
    </div>
  </div>
  <div class="flex flex-col gap-3">
    <div>
      <app-collapsible-section [collapsed]="false" [icon]="Icons.Crown">
        <div csHeader><span class="text-xs">Announcement</span></div>
        <div csContent>
          <app-random-quote></app-random-quote>
        </div>
      </app-collapsible-section>
    </div>
    <div>
      <app-collapsible-section [icon]="Icons.Clock">
        <div csHeader><span class="text-xs">Recent</span></div>
        <div csContent>
          <ul class="list-disc ml-2 text-xs text-neutralGray-500">
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
          </ul>
        </div>
      </app-collapsible-section>
    </div>
    <div>
      <app-collapsible-section [collapsed]="false" [icon]="Icons.CalendarClock">
        <div csHeader><span class="text-xs">Schedule</span></div>
        <div csContent>
          <div class="border-l-neutral-200 flex flex-col gap-2">
            <div class="flex justify-between gap-5">
              <span class="flex items-center text-sm">
                <lucide-icon
                  [img]="Icons.CircleCheck"
                  strokeWidth="1"
                  class="mr-1 text-success size-3.5"
                ></lucide-icon>
                <span class="text-xs text-neutralGray-500">Planning</span>
              </span>
              <span class="flex items-center bg-neutral-200 rounded-[10px] text-[8px] px-1.5"
                >8 AM</span
              >
            </div>

            <div class="flex justify-between gap-5">
              <span class="flex items-center text-sm">
                <lucide-icon
                  [img]="Icons.CircleDashed"
                  strokeWidth="1"
                  class="mr-1 text-success size-3.5"
                ></lucide-icon>
                <span class="text-xs text-neutralGray-500">Deployment</span>
              </span>
              <span class="flex items-center bg-neutral-200 rounded-[10px] text-[8px] px-1.5"
                >3 PM</span
              >
            </div>
          </div>
        </div>
      </app-collapsible-section>
    </div>
    <div>
      <app-collapsible-section [icon]="Icons.Rocket" [collapsed]="false">
        <div csHeader><span class="text-xs">Deployments</span></div>
        <div csContent>
          <ul class="list-disc ml-2 text-xs text-neutralGray-500">
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
            <li>Lorem ipsum</li>
          </ul>
        </div>
      </app-collapsible-section>
    </div>
  </div>
</div>
