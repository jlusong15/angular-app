<div class="flex">
  <!-- Sidebar -->
  <app-sidebar-menu-nav-v2 (isOpenChange)="onSidebarToggle($event)"></app-sidebar-menu-nav-v2>

  <!-- Main Content -->
  <main
    [class.ml-54]="sidebarOpen"
    [class.ml-2]="!sidebarOpen"
    class="transition-all duration-300 flex-1"
  >
    <div class="p-4 min-h-svh">
      <router-outlet></router-outlet>
    </div>

    <!-- Footer -->
    <footer class="d-flex w-full text-right">
      <span class="text-gray-400 italic mt-5 text-[10px] pr-5 pb-3"
        >My Angular App by Jennifer Bautista</span
      >
    </footer>
  </main>
</div>
